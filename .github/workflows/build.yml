name: Build and Release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Calculate version
        id: meta
        shell: bash
        run: |
          VERSION="${{ github.run_number }}.0"
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Update manifest.json version
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          jq --arg v "$VERSION" '.version = $v' manifest.json > manifest.tmp
          mv manifest.tmp manifest.json

      - name: Commit updated manifest.json
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ steps.meta.outputs.version }} [skip ci]"
          git push

      - name: Build release packages
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          mkdir -p dist/chrome dist/firefox

          rsync -a --exclude '.git/' --exclude '.github/' --exclude 'dist/' --exclude '.*' ./ dist/chrome/
          rsync -a --exclude '.git/' --exclude '.github/' --exclude 'dist/' --exclude '.*' ./ dist/firefox/

          jq '.background = {scripts: ["background.js"]} | del(.background.service_worker)' dist/firefox/manifest.json > dist/firefox/manifest.tmp
          mv dist/firefox/manifest.tmp dist/firefox/manifest.json

          (
            cd dist/chrome
            zip -r "../saveyourtime-chrome-${VERSION}.zip" .
          )

          (
            cd dist/firefox
            zip -r "../saveyourtime-firefox-${VERSION}.zip" .
          )

          rm -rf dist/chrome dist/firefox

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/*.zip --clobber
          else
            gh release create "$TAG" dist/*.zip \
              --title "SaveYourTime $TAG" \
              --generate-notes
          fi

      - name: Write summary
        shell: bash
        run: |
          {
            echo "# SaveYourTime v${{ steps.meta.outputs.version }}"
            echo ""
            echo "- Tag: \`${{ steps.meta.outputs.tag }}\`"
            echo "- Assets:"
            echo "  - \`saveyourtime-chrome-${{ steps.meta.outputs.version }}.zip\`"
            echo "  - \`saveyourtime-firefox-${{ steps.meta.outputs.version }}.zip\`"
          } >> "$GITHUB_STEP_SUMMARY"
